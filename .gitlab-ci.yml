stages:
  - build

variables:
  GOMODCACHE: /go/pkg/mod
  GOCACHE: /cache/go-build
  CGO_ENABLED: "0"

cache:
  key: go-cache
  paths:
    - /go/pkg/mod
    - /cache/go-build

alpine-build:
  stage: build
  image: golang:1.21-alpine

  before_script:
    - apk add --no-cache git build-base ca-certificates

  script:
    - go mod download
    - go test ./... -short
    - go build -ldflags="-s -w" ./...
