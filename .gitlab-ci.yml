stages:
  - build
  - release

variables:
  BINARY_NAME: ispdb

build:
  stage: build
  image: docker:stable
  services:
    - docker:dind
  script:
    - docker run --rm -v "$CI_PROJECT_DIR":/app -w /app golang:alpine go build -ldflags="-s -w" -o $BINARY_NAME
  artifacts:
    paths:
      - $BINARY_NAME
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Creating release"
  release:
    tag_name: $CI_COMMIT_TAG
    name: Release $CI_COMMIT_TAG
    description: "Auto release for $CI_COMMIT_TAG"
    assets:
      links:
        - name: $BINARY_NAME
          url: "$CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/file/$BINARY_NAME"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/