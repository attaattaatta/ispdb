name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary (dockerized Go build)
        run: |
          docker run --rm \
            -v "$PWD":/app \
            -w /app \
            golang:alpine \
            go build -ldflags='-s -w' -o ispdb

      - name: Make release
        uses: softprops/action-gh-release@v2
        with:
          files: ispdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}